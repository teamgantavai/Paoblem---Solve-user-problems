version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app-1:
    build: .
    restart: always
    env_file:
      - .env.local
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  app-2:
    build: .
    restart: always
    env_file:
      - .env.local
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: always
    command: npm run worker
    env_file:
      - .env.local
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_OPTIONS=--experimental-websocket
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-1
      - app-2

volumes:
  redis_data:
